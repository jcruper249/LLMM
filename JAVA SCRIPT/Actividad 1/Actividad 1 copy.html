<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Actividad 1</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='JS.js'></script>
</head>
<body>
    <script>
        function turnOnLight() {
            document.querySelector('img').src = '../IMG/bombilla 1.jpg';
        }

        function turnOffLight() {
            document.querySelector('img').src = '../IMG/bombilla 0.jpg';
        }

        document.querySelectorAll('button')[0].addEventListener('click', turnOnLight);
        document.querySelectorAll('button')[1].addEventListener('click', turnOffLight);
    </script>
</body>
</html>
