<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Biblioteca XML</title>
    <link rel='stylesheet' href='main.css'
</head>
<body>
    <h2>Lista de Libros</h2>
    <table border='1' id="tabla">
        <tr>
            <th>Título</th>
            <th>Autor</th>
            <th>Año</th>
        </tr>
    </table>

    <script>
        fetch("libros.xml")
        .then(response => response.text())
        .then(data => {
            let parser = new DOMParser();
            let xml = parser.parseFromString(data, "text/xml");
            let libros = xml.getElementsByTagName("libro");
            let tabla = document.getElementById("tabla");
            for (let i = 0; i < libros.length; i++) {
                let titulo = libros[i].getElementsByTagName("titulo")[0].textContent;
                let autor = libros[i].getElementsByTagName("autor")[0].textContent;
                let anio = libros[i].getElementsByTagName("anio")[0].textContent;

                let fila = `
                <tr>
                    <td>${titulo}</td>
                    <td>${autor}</td>
                    <td>${anio}</td>
                </tr>`;
                tabla.innerHTML += fila;
            }
            });
    </script>
</body>

</html>
